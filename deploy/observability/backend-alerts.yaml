apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: swkoo-backend-alerts
  namespace: monitoring
  labels:
    app: kube-prometheus-stack
    release: kube-prometheus-stack
spec:
  groups:
    - name: swkoo.backend
      rules:
        - alert: SwkooBackendDown
          # `up == 0` only fires when the scrape target is registered but
          # unreachable. When the pod is scaled to 0 (or otherwise leaves
          # the ServiceMonitor's selector), the target disappears entirely
          # and `up` returns no series — so we need `absent()` to catch
          # that case. Verified during the 2026-05-20 PVC restore where
          # the original `up == 0` form silently missed a ~3 min outage.
          #
          # for: 3m chosen to swallow planned deploy windows. Recreate
          # strategy on a single-node RWO PVC means every backend deploy
          # produces ~30-90s of downtime. After the Step 2.2 OCI SDK
          # init was added, startup got heavier and the previous 1m
          # threshold started firing on every deploy. 3m clears typical
          # deploys while keeping real outages within operator response
          # time (minutes-scale on a friend beta).
          expr: up{job="swkoo-backend"} == 0 or absent(up{job="swkoo-backend"}) == 1
          for: 3m
          labels:
            severity: critical
            namespace: swkoo
            app: swkoo-backend
          annotations:
            summary: swkoo-backend is unreachable
            description: Prometheus has been unable to scrape swkoo-backend /metrics for over 1 minute — pod down, networking, or readiness probe failing
            runbook: 'kubectl get pods -n swkoo -l app=swkoo-backend; kubectl logs -n swkoo -l app=swkoo-backend --tail=100'

        - alert: SwkooBackendHighErrorRate
          expr: |
            sum(rate(http_requests_total{job="swkoo-backend", status_code=~"5.."}[5m]))
              /
            sum(rate(http_requests_total{job="swkoo-backend"}[5m])) > 0.02
          for: 2m
          labels:
            severity: critical
            namespace: swkoo
            app: swkoo-backend
          annotations:
            summary: swkoo-backend 5xx error rate above 2%
            description: 5xx error ratio has been above 2% for 2 minutes ({{ $value | printf "%.1f%%" }}) — check the latest deployment first
            runbook: 'Roll back the latest backend image if it just shipped. Check kubectl logs -n swkoo -l app=swkoo-backend for stack traces.'

        - alert: SwkooBackendHighLatency
          expr: |
            histogram_quantile(
              0.95,
              sum by (le) (rate(http_request_duration_seconds_bucket{job="swkoo-backend"}[5m]))
            ) > 1
          for: 5m
          labels:
            severity: warning
            namespace: swkoo
            app: swkoo-backend
          annotations:
            summary: swkoo-backend p95 latency above 1s
            description: P95 request duration has been above 1 second for 5 minutes ({{ $value | printf "%.2fs" }}) — likely upstream (Argo CD / GitHub / Alertmanager) slowness
            runbook: 'curl https://swkoo.kr/api/health → backend 자체 응답 시간. histogram_quantile(0.95, sum by (route) (rate(http_request_duration_seconds_bucket{job="swkoo-backend"}[5m]))) 로 어느 route 가 느린지 분리. ArgoCD / GitHub / Alertmanager API 가 일시 느려진 경우가 흔함.'
