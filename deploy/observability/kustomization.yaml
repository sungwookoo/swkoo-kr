apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Observability resources live in the `monitoring` namespace, separate from the
# swkoo namespace managed by `deploy/base/`. A dedicated Argo CD Application
# (see application.yaml) syncs this directory.
resources:
  - swkoo-application-alerts.yaml
  - argocd-servicemonitor.yaml
  - argocd-alerts.yaml
  - backend-servicemonitor.yaml
  - backend-alerts.yaml
  - alertmanager-discord-deployment.yaml
  - alertmanagerconfig-discord.yaml
  # alertmanager-cr-patch.yaml is intentionally NOT included — the
  # Alertmanager CR is helm-managed and emitting our own full copy via
  # kustomize would clobber helm's other fields. That file is reference
  # material; apply it once via `kubectl patch` (see deploy/README.md).
